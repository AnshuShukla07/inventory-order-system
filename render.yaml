databases:
  - name: inventory-db
    databaseName: inventory_db
    plan: free

services:
  # 1. FastAPI Backend
  - type: web
    name: inventory-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: ADMIN_API_KEY
        value: admin123  # Default admin passcode (changeable in Render dashboard env settings)

  # 2. React Frontend
  - type: web
    name: inventory-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: inventory-backend
          type: web
          property: url
